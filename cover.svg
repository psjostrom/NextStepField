<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" rx="40" fill="#0a0e17"/>

  <!-- Data field box -->
  <rect x="50" y="62" width="400" height="325" rx="20" fill="#141a28" stroke="#1e2640" stroke-width="1.5"/>

  <!-- Step name -->
  <text x="250" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="65" font-weight="bold" fill="#FFaa33">TEMPO</text>

  <!-- HR range -->
  <text x="250" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="bold" fill="#e0e0e0">155-170</text>

  <!-- Duration -->
  <text x="250" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="47" fill="#8a8a9a">5:00</text>

  <!-- App name -->
  <text x="250" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#3a3e50">NextStep</text>
</svg>
